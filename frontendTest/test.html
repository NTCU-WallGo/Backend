<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastAPI 註冊與 JWT 測試</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 30px auto; line-height: 1.6; padding: 20px; }
        .box { margin-bottom: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
        input { display: block; width: 100%; margin: 10px 0; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; cursor: pointer; border-radius: 4px; margin-top: 5px; }
        button:hover { background-color: #0056b3; }
        pre { background: #f4f4f4; padding: 15px; white-space: pre-wrap; word-wrap: break-word; border-radius: 4px; font-size: 14px;}
        .success { color: green; font-weight: bold; }
        .error { color: red; font-weight: bold; }
    </style>
</head>
<body>

    <h2>FastAPI 完整流程測試</h2>

    <div class="box">
        <h3>1. 註冊帳號</h3>
        <input type="text" id="reg_user" placeholder="帳號">
        <input type="email" id="reg_email" placeholder="電子信箱">
        <input type="password" id="reg_pass" placeholder="密碼">
        <button onclick="register()">點我註冊</button>
    </div>

    <div class="box">
        <h3>2. 使用者登入</h3>
        <input type="text" id="login_user" placeholder="帳號">
        <input type="password" id="login_pass" placeholder="密碼">
        <button onclick="login()">點我登入</button>
    </div>

    <div class="box">
        <h3>3. 測試受保護的 API</h3>
        <button onclick="getProtectedData()">取得個人資料 (/api/me)</button>
    </div>

    <div class="box">
        <h3>系統訊息：</h3>
        <pre id="message">等待操作...</pre>
    </div>

    <script>
        // 設定 API 基礎路徑
        const API_BASE_URL = "http://127.0.0.1:8000/api";
        // 宣告全域變數來儲存 Token
        let jwtToken = ""; 

        // 統一處理訊息顯示的輔助函數
        function showMessage(msg, isError = false) {
            const msgDiv = document.getElementById('message');
            msgDiv.className = isError ? "error" : "success";
            // 讓 JSON 格式化輸出比較好看
            msgDiv.innerText = typeof msg === 'string' ? msg : JSON.stringify(msg, null, 2);
        }

        // --- 1. 註冊功能 (使用 JSON 格式) ---
        async function register() {
            showMessage("註冊中...");
            const payload = {
                username: document.getElementById('reg_user').value,
                email: document.getElementById('reg_email').value,
                password: document.getElementById('reg_pass').value
            };

            try {
                const response = await fetch(`${API_BASE_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();

                if (response.ok) {
                    showMessage("註冊成功: \n" + JSON.stringify(result, null, 2));
                } else {
                    showMessage("註冊失敗: \n" + (result.detail || JSON.stringify(result)), true);
                }
            } catch (error) {
                showMessage("無法連線至後端伺服器", true);
            }
        }

        // --- 2. 登入功能 (使用 Form-Data 格式) ---
        async function login() {
            showMessage("登入中...");
            const formData = new URLSearchParams();
            formData.append("username", document.getElementById('login_user').value);
            formData.append("password", document.getElementById('login_pass').value);

            try {
                const response = await fetch(`${API_BASE_URL}/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" }, 
                    body: formData
                });
                
                const result = await response.json();

                if (response.ok) {
                    jwtToken = result.access_token; // 儲存 Token
                    showMessage("登入成功！Token 已儲存: \n" + JSON.stringify(result, null, 2));
                } else {
                    showMessage("登入失敗: \n" + (result.detail || JSON.stringify(result)), true);
                }
            } catch (error) {
                showMessage("無法連線至後端伺服器", true);
            }
        }

        // --- 3. 獲取受保護資料 (帶上 JWT Header) ---
        async function getProtectedData() {
            if (!jwtToken) {
                showMessage("錯誤：請先登入取得 Token！", true);
                return;
            }
            
            showMessage("讀取中...");

            try {
                const response = await fetch(`${API_BASE_URL}/me`, {
                    method: "GET",
                    headers: { 
                        "Authorization": `Bearer ${jwtToken}` 
                    }
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    showMessage("成功取得受保護資料: \n" + JSON.stringify(result, null, 2));
                } else {
                    showMessage("獲取資料失敗: \n" + (result.detail || JSON.stringify(result)), true);
                }
            } catch (error) {
                showMessage("無法連線至後端伺服器", true);
            }
        }
    </script>
</body>
</html>
