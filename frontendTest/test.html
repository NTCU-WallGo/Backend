<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastAPI 測試介面</title>
    <style>
        body { font-family: sans-serif; max-width: 400px; margin: 50px auto; line-height: 1.6; }
        .form-group { margin-bottom: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
        input { display: block; width: 100%; margin: 10px 0; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        #message { margin-top: 20px; color: blue; font-weight: bold; }
    </style>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script> 
</head>
<body>

    <h2>FastAPI 功能測試</h2>

    <div class="form-group">
        <h3>註冊帳號</h3>
        <input type="text" id="reg_user" placeholder="帳號">
        <input type="email" id="reg_email" placeholder="電子信箱">
        <input type="password" id="reg_pass" placeholder="密碼">
        <div class="cf-turnstile" data-sitekey="1x00000000000000000000AA"></div>  // captcha_token
        <button onclick="handleAuth('register')">點我註冊</button>
    </div>

    <div class="form-group">
        <h3>使用者登入</h3>
        <input type="text" id="login_user" placeholder="帳號">
        <input type="password" id="login_pass" placeholder="密碼">
        <button onclick="handleAuth('login')">點我登入</button>
    </div>

    <div id="message"></div>

    <script>
        const API_BASE_URL = "http://127.0.0.1:8000/api";

        async function handleAuth(type) {
            const msgDiv = document.getElementById('message');
            msgDiv.innerText = "處理中...";
            
            let payload = {};
            let endpoint = "";

            if (type === 'register') {
                endpoint = "/register";

                // 抓取 Turnstile 產生的 token
                const turnstileResponse = document.querySelector('[name="cf-turnstile-response"]').value;

                if (!turnstileResponse) {
                    msgDiv.style.color = "red";
                    msgDiv.innerText = "請先完成安全驗證";
                    return;
                }

                payload = {
                    username: document.getElementById('reg_user').value,
                    email: document.getElementById('reg_email').value,
                    password: document.getElementById('reg_pass').value,
                    captcha_token: turnstileResponse  // 傳回後端用
                };
            } else {
                endpoint = "/login";
                payload = {
                    username: document.getElementById('login_user').value,
                    password: document.getElementById('login_pass').value
                };
            }

            try {
                const response = await fetch(API_BASE_URL + endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (response.ok) {
                    msgDiv.style.color = "green";
                    msgDiv.innerText = "成功: " + JSON.stringify(result);
                } else {
                    msgDiv.style.color = "red";
                    msgDiv.innerText = "失敗: " + (result.detail || "未知錯誤");
                }
            } catch (error) {
                msgDiv.style.color = "red";
                msgDiv.innerText = "無法連線至後端伺服器，請檢查 FastAPI 是否已啟動";
            }
        }

        // 若註冊失敗，建議重置 Turnstile 元件
        if (!response.ok && type === 'register') {

            // 如果驗證失敗，讓使用者可以重試
            turnstile.reset(); 
        }
    </script>
</body>
</html>
